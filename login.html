
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - 10th M1</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    background: linear-gradient(135deg, #8B4513, #D2691E);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.login-box {
    background: white;
    padding: 35px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
}

h2 {
    margin-bottom: 10px;
    color: #333;
}

.subtitle {
    font-size: 13px;
    color: #777;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
}

input:focus {
    border-color: #8B4513;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #8B4513;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #704010;
}

.info {
    margin-top: 15px;
    font-size: 12px;
    color: #555;
}

.info span {
    display: block;
    margin-top: 5px;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>🎓 10th M1</h2>
    <div class="subtitle">Event Fund Tracker Login</div>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<script>
async function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch('/api/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username,password})
    });

    const data = await res.json();

    if(!res.ok){
        alert("❌ Invalid Login");
        return;
    }

    localStorage.setItem("user", JSON.stringify(data));

    if(data.role === "admin"){
        window.location.href = "index-mongodb.html";
    } else {
        window.location.href = "dashboard.html";
    }
}
</script>

</body>
</html>
