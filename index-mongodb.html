
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th M1 Get-Together - Expense Tracker (Real-Time)</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- ✅ YOUR ORIGINAL CSS (UNCHANGED) -->
</head>

<body>
<div class="container">

    <!-- HEADER -->
    <div class="header-banner">
        <h1>🎓 10th M1 Get-Together</h1>
        <p>Event Fund & Expense Tracker</p>
        <div class="school-name">Modern School & Jr. College, Vashi, Navi Mumbai</div>

        <!-- ✅ LOGOUT BUTTON (ADDED ONLY) -->
        <button onclick="logout()" style="position:absolute; top:20px; right:20px; background:#333;color:#fff;padding:8px 12px;border:none;border-radius:6px;">
            Logout
        </button>
    </div>

    <div class="main-content">

        <!-- EXPORT BUTTONS -->
        <div class="export-buttons">
            <button class="btn btn-csv" onclick="exportToCSV()">📥 Download CSV</button>
            <button class="btn btn-excel" onclick="exportToExcel()">📊 Download Excel</button>
            <!-- ❌ CLEAR ALL REMOVED -->
        </div>

        <!-- SUMMARY -->
        <div class="summary-cards">
            <div class="card">
                <div class="card-label">💰 Total Collected</div>
                <div class="card-value positive" id="total-contrib">₹0</div>
            </div>
            <div class="card">
                <div class="card-label">💸 Total Spent</div>
                <div class="card-value negative" id="total-exp">₹0</div>
            </div>
            <div class="card">
                <div class="card-label">💵 Balance Left</div>
                <div class="card-value" id="net-balance">₹0</div>
            </div>
        </div>

        <!-- ADD CONTRIBUTION -->
        <div class="section">
            <h2>➕ Add Collection/Contribution</h2>
            <input type="text" id="contrib-name" placeholder="Name">
            <input type="number" id="contrib-amount" placeholder="Amount">
            <button onclick="addContribution()">Add</button>
        </div>

        <!-- ADD EXPENSE -->
        <div class="section">
            <h2>➖ Add Expense</h2>
            <input type="text" id="expense-name" placeholder="Expense">
            <input type="number" id="expense-amount" placeholder="Amount">
            <input type="text" id="expense-paid-by" placeholder="Paid By">
            <button onclick="addExpense()">Add</button>
        </div>

        <!-- TRANSACTIONS -->
        <div class="section">
            <h2>📋 All Transactions</h2>
            <div id="transactions-list"></div>
        </div>

    </div>
</div>

<script>

// 🔒 ADMIN PROTECTION
const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "admin") {
    window.location.href = "/login.html";
}

// ✅ AUTO URL FIX
const API_URL = window.location.origin;

// LOAD DATA
async function loadData() {
    const [contributions, expenses] = await Promise.all([
        fetch(`${API_URL}/api/contributions`).then(r => r.json()),
        fetch(`${API_URL}/api/expenses`).then(r => r.json())
    ]);

    window.contributions = contributions;
    window.expenses = expenses;

    updateUI();
}

// UPDATE UI (YOUR SAME STYLE)
function updateUI() {
    let totalC = 0;
    let totalE = 0;

    contributions.forEach(c => totalC += c.amount);
    expenses.forEach(e => totalE += e.amount);

    document.getElementById('total-contrib').innerText = "₹" + totalC;
    document.getElementById('total-exp').innerText = "₹" + totalE;
    document.getElementById('net-balance').innerText = "₹" + (totalC - totalE);

    const all = [
        ...contributions.map(x => ({...x, type:'contribution'})),
        ...expenses.map(x => ({...x, type:'expense'}))
    ].sort((a,b)=>new Date(b.date)-new Date(a.date));

    let html = '';

    all.forEach(t => {
        html += `
        <div class="transaction-item">
            <div>
                <b>${t.name}</b> - ₹${t.amount}
            </div>
            <button onclick="deleteTransaction('${t._id}','${t.type}')">Delete</button>
        </div>`;
    });

    document.getElementById("transactions-list").innerHTML = html;
}

// ADD CONTRIBUTION
async function addContribution(){
    const name = document.getElementById("contrib-name").value;
    const amount = Number(document.getElementById("contrib-amount").value);

    await fetch(`${API_URL}/api/contributions`, {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name,amount})
    });

    loadData();
}

// ADD EXPENSE
async function addExpense(){
    const name = document.getElementById("expense-name").value;
    const amount = Number(document.getElementById("expense-amount").value);
    const paidBy = document.getElementById("expense-paid-by").value;

    await fetch(`${API_URL}/api/expenses`, {
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name,amount,paidBy})
    });

    loadData();
}

// ✅ DELETE FIXED
async function deleteTransaction(id,type){
    if(!confirm("Delete?")) return;

    const url = type==='contribution'
        ? `${API_URL}/api/contributions/${id}`
        : `${API_URL}/api/expenses/${id}`;

    await fetch(url,{method:'DELETE'});
    loadData();
}

// ✅ LOGOUT
function logout(){
    localStorage.removeItem("user");
    window.location.href="/login.html";
}

// START
loadData();

</script>

</body>
</html>
