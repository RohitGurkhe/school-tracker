
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together - Expense Tracker (Real-Time)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ✅ YOUR ORIGINAL UI (UNCHANGED) */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system;background:linear-gradient(135deg,#8B4513,#D2691E);padding:20px;}
.container{max-width:1100px;margin:auto;background:white;border-radius:12px;overflow:hidden;}
.header-banner{background:linear-gradient(135deg,#8B4513,#D2691E);color:white;padding:40px;text-align:center;}
.main-content{padding:30px;}
.card{background:#f5f5f5;padding:15px;border-radius:8px;margin-bottom:10px;}
.delete-btn{background:#e74c3c;color:white;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<div class="header-banner">
<h1>🎓 10th M1 Get-Together</h1>
<p>Expense Tracker</p>
</div>

<div class="main-content">

<h3>Total Balance: ₹<span id="balance">0</span></h3>

<hr>

<h3>Add Contribution</h3>
<input id="cname" placeholder="Name">
<input id="camount" type="number" placeholder="Amount">
<button onclick="addContribution()">Add</button>

<h3>Add Expense</h3>
<input id="ename" placeholder="Expense">
<input id="eamount" type="number" placeholder="Amount">
<button onclick="addExpense()">Add</button>

<hr>

<h3>Transactions</h3>
<div id="list"></div>

</div>
</div>

<script>

// ✅ IMPORTANT FIX
const API_URL = window.location.origin;

// LOAD DATA
async function loadData(){
    const [c,e] = await Promise.all([
        fetch(`${API_URL}/api/contributions`).then(r=>r.json()),
        fetch(`${API_URL}/api/expenses`).then(r=>r.json())
    ]);

    window.contributions = c;
    window.expenses = e;

    updateUI();
}

// UPDATE UI
function updateUI(){
    let total = 0;

    const all = [
        ...window.contributions.map(x=>({...x,type:'c'})),
        ...window.expenses.map(x=>({...x,type:'e'}))
    ].sort((a,b)=>new Date(b.date)-new Date(a.date));

    let html='';

    all.forEach(item=>{
        total += item.type==='c'?item.amount:-item.amount;

        html += `
        <div class="card">
            <b>${item.name}</b> - ₹${item.amount}
            <button class="delete-btn" onclick="deleteTransaction('${item._id}','${item.type}')">Delete</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
    document.getElementById("balance").innerText = total;
}

// ADD CONTRIBUTION
async function addContribution(){
    const name=document.getElementById("cname").value;
    const amount=Number(document.getElementById("camount").value);

    if(!name||amount<=0)return alert("Enter valid data");

    await fetch(`${API_URL}/api/contributions`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,amount})
    });

    document.getElementById("cname").value='';
    document.getElementById("camount").value='';
    loadData();
}

// ADD EXPENSE
async function addExpense(){
    const name=document.getElementById("ename").value;
    const amount=Number(document.getElementById("eamount").value);

    if(!name||amount<=0)return alert("Enter valid data");

    await fetch(`${API_URL}/api/expenses`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,amount})
    });

    document.getElementById("ename").value='';
    document.getElementById("eamount").value='';
    loadData();
}

// ✅ DELETE FIXED
async function deleteTransaction(id,type){
    if(!confirm("Delete this entry?")) return;

    const url = type==='c'
        ? `${API_URL}/api/contributions/${id}`
        : `${API_URL}/api/expenses/${id}`;

    const res = await fetch(url,{method:'DELETE'});

    if(res.ok){
        loadData();
    } else {
        alert("❌ Delete failed");
    }
}

// START
loadData();

</script>

</body>
</html>
