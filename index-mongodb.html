
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#8B4513,#D2691E);
    padding:20px;
}
.container {
    max-width:1100px;
    margin:auto;
    background:white;
    border-radius:10px;
    padding:20px;
}
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.btn {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.logout-btn {
    background:#333;
    color:white;
}
.delete-btn {
    background:red;
    color:white;
}
.card {
    padding:10px;
    margin:8px 0;
    background:#f5f5f5;
    border-radius:6px;
}
input {
    padding:8px;
    margin:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>🎓 10th M1 Get-Together</h2>

    <!-- ✅ LOGOUT BUTTON -->
    <button class="btn logout-btn" onclick="logout()">Logout</button>
</div>

<h3>Total Balance: ₹<span id="balance">0</span></h3>

<hr>

<h3>Add Contribution</h3>
<input id="cname" placeholder="Name">
<input id="camount" type="number" placeholder="Amount">
<button class="btn" onclick="addContribution()">Add</button>

<h3>Add Expense</h3>
<input id="ename" placeholder="Expense">
<input id="eamount" type="number" placeholder="Amount">
<button class="btn" onclick="addExpense()">Add</button>

<hr>

<h3>Transactions</h3>
<div id="list"></div>

</div>

<script>

// 🔒 PROTECT PAGE
const user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "admin") {
    window.location.href = "/login.html";
}

// ✅ AUTO URL (WORKS LOCAL + LIVE)
const API_URL = window.location.origin;

// LOAD DATA
async function loadData(){
    const [c,e] = await Promise.all([
        fetch(`${API_URL}/api/contributions`).then(r=>r.json()),
        fetch(`${API_URL}/api/expenses`).then(r=>r.json())
    ]);

    window.contributions = c;
    window.expenses = e;

    updateUI();
}

// UPDATE UI
function updateUI(){
    let total = 0;

    const all = [
        ...window.contributions.map(x=>({...x,type:'contribution'})),
        ...window.expenses.map(x=>({...x,type:'expense'}))
    ].sort((a,b)=>new Date(b.date)-new Date(a.date));

    let html='';

    all.forEach(item=>{
        total += item.type==='contribution'?item.amount:-item.amount;

        html += `
        <div class="card">
            <b>${item.name}</b> - ₹${item.amount}
            <button class="btn delete-btn" onclick="deleteTransaction('${item._id}','${item.type}')">Delete</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
    document.getElementById("balance").innerText = total;
}

// ADD CONTRIBUTION
async function addContribution(){
    const name=document.getElementById("cname").value;
    const amount=Number(document.getElementById("camount").value);

    if(!name||amount<=0)return alert("Enter valid data");

    await fetch(`${API_URL}/api/contributions`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,amount})
    });

    document.getElementById("cname").value='';
    document.getElementById("camount").value='';
    loadData();
}

// ADD EXPENSE
async function addExpense(){
    const name=document.getElementById("ename").value;
    const amount=Number(document.getElementById("eamount").value);

    if(!name||amount<=0)return alert("Enter valid data");

    await fetch(`${API_URL}/api/expenses`,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,amount})
    });

    document.getElementById("ename").value='';
    document.getElementById("eamount").value='';
    loadData();
}

// ✅ DELETE FIXED
async function deleteTransaction(id,type){
    if(!confirm("Delete this entry?")) return;

    const url = type==='contribution'
        ? `${API_URL}/api/contributions/${id}`
        : `${API_URL}/api/expenses/${id}`;

    const res = await fetch(url,{method:'DELETE'});

    if(res.ok){
        loadData();
    } else {
        alert("❌ Delete failed");
    }
}

// ✅ LOGOUT FUNCTION
function logout(){
    localStorage.removeItem("user");
    window.location.href="/login.html";
}

// START
loadData();

</script>

</body>
</html>
