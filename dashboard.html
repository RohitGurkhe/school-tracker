<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial;
}

/* BACKGROUND */
body{
background:
linear-gradient(rgba(180,83,9,0.85), rgba(234,88,12,0.9)),
url('school.jpeg') center/cover no-repeat;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px 20px;
color:#fff;
}

/* HERO */
.hero{
text-align:center;
color:#fff;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:10px;
}

/* CARD */
.card{
background:#fff;
border-radius:12px;
padding:20px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 25px rgba(0,0,0,0.3);
}

/* SPECIAL COLORS */
.card-green{
border-left:5px solid #16a34a;
}

.card-red{
border-left:5px solid #dc2626;
}

/* BALANCE */
.balance{
text-align:center;
font-size:26px;
margin:10px 0;
}

/* SMALL BOX */
.row{
display:flex;
justify-content:center;
gap:10px;
}

.box{
background:#f3f4f6;
padding:8px 15px;
border-radius:8px;
}

.green{color:#16a34a;}
.red{color:#dc2626;}

/* CHART */
canvas{
max-width:200px;
margin:auto;
display:block;
}

/* DROPDOWN */
.dropdown{
max-height:0;
overflow:hidden;
transition:all 0.4s ease;
opacity:0;
}

.dropdown.open{
max-height:500px;
opacity:1;
}

/* LIST ITEM */
.item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

/* LOGIN */
.login-btn{
border:1px solid #fff;
padding:6px 12px;
border-radius:6px;
background:transparent;
color:#fff;
}

.modal{
position:fixed;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:300px;
}

.modal.show{
display:flex;
}
</style>
</head>

<body>

<div class="header">

<button class="login-btn" onclick="openLogin()">Admin Login</button>
</div>

<div class="hero">
<h2>10th M1 Get-Together</h2>
<p>Event Fund Dashboard</p>
</div>

<div class="container">

<!-- BALANCE -->
<div class="card">
<h3>Current Balance</h3>
<div class="balance" id="balance">₹0</div>

<div class="row">
<div class="box green">Collected: ₹<span id="totalC">0</span></div>
<div class="box red">Spent: ₹<span id="totalE">0</span></div>
</div>
</div>

<!-- CHART -->
<div class="card">
<h3>Fund Breakdown</h3>
<canvas id="chart"></canvas>
</div>

<!-- 💰 CONTRIBUTIONS CARD -->
<div class="card card-green">
<h3 onclick="toggle('contrib')" style="cursor:pointer;">
💰 Contributions ▼
</h3>
<div id="contribList" class="dropdown"></div>
</div>

<!-- 💸 EXPENSES CARD -->
<div class="card card-red">
<h3 onclick="toggle('expense')" style="cursor:pointer;">
💸 Expenses ▼
</h3>
<div id="expenseList" class="dropdown"></div>
</div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<script>

const API="https://school-tracker-vnba.onrender.com";
let chart;

async function loadData(){

const [c,e]=await Promise.all([
fetch(`${API}/api/contributions`).then(r=>r.json()),
fetch(`${API}/api/expenses`).then(r=>r.json())
]);

update(c,e);
}

function update(c,e){

let tc=c.reduce((s,x)=>s+x.amount,0);
let te=e.reduce((s,x)=>s+x.amount,0);

document.getElementById("totalC").innerText=tc;
document.getElementById("totalE").innerText=te;
document.getElementById("balance").innerText="₹"+(tc-te);

document.getElementById("contribList").innerHTML=
c.map(x=>`
<div class="item">
${x.name}
<span class="green">+₹${x.amount}</span>
</div>
`).join("");

document.getElementById("expenseList").innerHTML=
e.map(x=>`
<div class="item">
${x.name}
<span class="red">-₹${x.amount}</span>
</div>
`).join("");

drawChart(tc,te);
}

/* CHART */
function drawChart(c,e){

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'doughnut',
data:{
labels:["Collected","Spent"],
datasets:[{
data:[c,e],
backgroundColor:["#16a34a","#dc2626"]
}]
}
});
}

/* DROPDOWN */
function toggle(type){
const el=document.getElementById(type==="contrib"?"contribList":"expenseList");
el.classList.toggle("open");
}

/* LOGIN */
function openLogin(){
document.getElementById("loginModal").classList.add("show");
}

async function login(){
const res=await fetch(`${API}/api/login`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:document.getElementById("user").value,
password:document.getElementById("pass").value
})
});

if(res.ok){
localStorage.setItem("isAdmin","true");
window.location.href="/index-mongodb.html";
}
}

loadData();
setInterval(loadData,5000);

</script>

</body>
</html>
