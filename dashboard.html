<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

/* 🔥 BACKGROUND */
body{
min-height:100vh;
background:
linear-gradient(rgba(20,30,80,0.8), rgba(20,30,80,0.9)),
url('school.jpeg') center/cover no-repeat;
color:#fff;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.login-btn{
padding:8px 15px;
border-radius:8px;
border:1px solid #fff;
background:transparent;
color:#fff;
cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
margin:20px;
}

.hero h1{
font-size:26px;
}

/* CARD */
.card{
background:#ffffff;
color:#000;
border-radius:12px;
padding:15px;
margin:15px;
}

/* SUMMARY */
.summary{
display:flex;
gap:10px;
}

.box{
flex:1;
background:#f2f2f2;
padding:15px;
border-radius:10px;
text-align:center;
}

/* COLORS */
.green{color:green;}
.red{color:red;}

/* LIST */
.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #ddd;
}

/* CHART */
canvas{
max-width:200px;
margin:auto;
display:block;
}

/* LOGIN MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:300px;
color:#000;
}

.modal input{
width:100%;
padding:10px;
margin:8px 0;
}

.modal button{
width:100%;
padding:10px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
}

.modal.show{
display:flex;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h3>🎓 10th M1</h3>
<button class="login-btn" onclick="openLogin()">Admin Login</button>
</div>

<!-- HERO -->
<div class="hero">
<h1>10th M1 Get-Together</h1>
<p>Event Fund Dashboard</p>
</div>

<!-- MAIN CARD -->
<div class="card">

<h3 style="text-align:center">Balance</h3>
<h1 id="balance" style="text-align:center">₹0</h1>

<div class="summary">
<div class="box">
<p>Collected</p>
<h3 id="totalC">₹0</h3>
</div>
<div class="box">
<p>Spent</p>
<h3 id="totalE" class="red">₹0</h3>
</div>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

<!-- CONTRIBUTIONS -->
<h3>💰 Contributions</h3>
<div id="contribList"></div>

<!-- EXPENSES -->
<h3>💸 Expenses</h3>
<div id="expenseList"></div>

</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Admin Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="err" style="color:red;"></p>
</div>
</div>

<script>

const API_URL = "https://school-tracker-vnba.onrender.com";
let chart;

// LOAD DATA
async function loadData(){
const [c,e] = await Promise.all([
fetch(`${API_URL}/api/contributions`).then(r=>r.json()),
fetch(`${API_URL}/api/expenses`).then(r=>r.json())
]);

updateUI(c,e);
}

// UPDATE UI
function updateUI(c,e){

let totalC = c.reduce((s,x)=>s+x.amount,0);
let totalE = e.reduce((s,x)=>s+x.amount,0);

document.getElementById("totalC").innerText="₹"+totalC;
document.getElementById("totalE").innerText="₹"+totalE;
document.getElementById("balance").innerText="₹"+(totalC-totalE);

document.getElementById("contribList").innerHTML =
c.map(x=>`<div class="item"><span>${x.name}</span><span class="green">+₹${x.amount}</span></div>`).join("");

document.getElementById("expenseList").innerHTML =
e.map(x=>`<div class="item"><span>${x.name}</span><span class="red">-₹${x.amount}</span></div>`).join("");

drawChart(totalC,totalE);
}

// CHART
function drawChart(c,e){

const ctx = document.getElementById("chart");

if(chart) chart.destroy();

chart = new Chart(ctx,{
type:'doughnut',
data:{
labels:["Collected","Spent"],
datasets:[{
data:[c,e],
backgroundColor:["green","red"]
}]
}
});
}

// LOGIN
function openLogin(){
document.getElementById("loginModal").classList.add("show");
}

async function login(){

const user = document.getElementById("user").value;
const pass = document.getElementById("pass").value;

const res = await fetch(`${API_URL}/api/login`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:user,password:pass})
});

if(res.ok){
localStorage.setItem("isAdmin","true");
window.location.href="/index-mongodb.html";
}else{
document.getElementById("err").innerText="Invalid login";
}
}

// AUTO REFRESH
loadData();
setInterval(loadData,5000);

</script>

</body>
</html>
