<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:
linear-gradient(135deg, rgba(139,69,19,0.9), rgba(210,105,30,0.9)),
url('/school.jpeg') center/cover no-repeat;
min-height:100vh;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
color:white;
margin-bottom:20px;
position:relative;
}

.admin-btn{
position:absolute;
right:10px;
top:10px;
background:#8B4513;
color:#fff;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
}

.admin-btn:hover{
background:#6d3410;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
}

/* SUMMARY CARDS */
.summary{
display:flex;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:#fff;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card h2{
margin-top:10px;
}

.green{color:green;}
.red{color:red;}

/* DROPDOWN CARDS */
.drop-card{
background:#fff;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
overflow:hidden;
}

.drop-header{
padding:15px;
cursor:pointer;
display:flex;
justify-content:space-between;
font-weight:bold;
background:#f5f5f5;
}

.drop-content{
max-height:0;
overflow:hidden;
transition:0.4s ease;
}

.drop-content.active{
max-height:400px;
padding:10px 15px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #ddd;
}

/* FOOTER */
.footer{
text-align:center;
color:white;
margin-top:20px;
font-size:14px;
}

/* MOBILE */
@media(max-width:600px){
.summary{
flex-direction:column;
}
}
</style>
</head>

<body>

<div class="header">
<h1>🎓 10th M1 Get-Together</h1>
<p>Event Fund Dashboard (Public View)</p>

<!-- ADMIN LOGIN (UNCHANGED) -->
<a href="/login.html" class="admin-btn">Admin Login</a>
</div>

<div class="container">

<!-- SUMMARY -->
<div class="summary">
<div class="card">
<p>Total Collected</p>
<h2 id="totalC">₹0</h2>
</div>

<div class="card">
<p>Total Spent</p>
<h2 id="totalE" class="red">₹0</h2>
</div>

<div class="card">
<p>Balance</p>
<h2 id="balance">₹0</h2>
</div>
</div>

<!-- CONTRIBUTIONS -->
<div class="drop-card">
<div class="drop-header" onclick="toggleDrop('contribList')">
💰 Contributions ▼
</div>
<div id="contribList" class="drop-content"></div>
</div>

<!-- EXPENSES -->
<div class="drop-card">
<div class="drop-header" onclick="toggleDrop('expenseList')">
💸 Expenses ▼
</div>
<div id="expenseList" class="drop-content"></div>
</div>

</div>

<div class="footer">
Created by Rohit Gurkhe
</div>

<script>
const API_URL = window.location.origin;

// TOGGLE DROPDOWN
function toggleDrop(id){
document.getElementById(id).classList.toggle("active");
}

// LOAD DATA
async function loadData(){
try{
const [c,e] = await Promise.all([
fetch(`${API_URL}/api/contributions`).then(r=>r.json()),
fetch(`${API_URL}/api/expenses`).then(r=>r.json())
]);

updateUI(c,e);
}catch(err){
console.error("Error loading data:",err);
}
}

// UPDATE UI
function updateUI(contributions, expenses){

let totalC=0;
let totalE=0;

contributions.forEach(x=> totalC += x.amount);
expenses.forEach(x=> totalE += x.amount);

document.getElementById("totalC").innerText="₹"+totalC;
document.getElementById("totalE").innerText="₹"+totalE;
document.getElementById("balance").innerText="₹"+(totalC-totalE);

document.getElementById("contribList").innerHTML =
contributions.map(x => `
<div class="item">
<span>${x.name}</span>
<span class="green">+₹${x.amount}</span>
</div>
`).join("");

document.getElementById("expenseList").innerHTML =
expenses.map(x => `
<div class="item">
<span>${x.name}</span>
<span class="red">-₹${x.amount}</span>
</div>
`).join("");
}

// AUTO REFRESH
setInterval(loadData,5000);
loadData();
</script>

</body>
</html>
