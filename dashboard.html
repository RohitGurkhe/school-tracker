
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ✅ FULL BACKGROUND IMAGE */
body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding: 20px;

    background:
        linear-gradient(135deg, rgba(139,69,19,0.85), rgba(210,105,30,0.85)),
        url('/school.jpeg') center/cover no-repeat;
}

/* MAIN CARD */
.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 20px;
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

.header h1 {
    color: white;
}

/* SUMMARY */
.summary {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: #f2f2f2;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.green { color: green; }
.red { color: red; }

/* LIST */
.section {
    margin-top: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">
    <h1>🎓 10th M1 Get-Together</h1>
    <p>Event Fund Dashboard (Public View)</p>
</div>

<div class="container">

    <!-- SUMMARY -->
    <div class="summary">
        <div class="card">
            <p>Total Collected</p>
            <h2 id="totalC">₹0</h2>
        </div>

        <div class="card">
            <p>Total Spent</p>
            <h2 id="totalE" class="red">₹0</h2>
        </div>

        <div class="card">
            <p>Balance</p>
            <h2 id="balance">₹0</h2>
        </div>
    </div>

    <!-- CONTRIBUTIONS -->
    <div class="section">
        <h3>💰 Contributions</h3>
        <div id="contribList"></div>
    </div>

    <!-- EXPENSES -->
    <div class="section">
        <h3>💸 Expenses</h3>
        <div id="expenseList"></div>
    </div>

</div>

<script>

const API_URL = window.location.origin;

// LOAD DATA
async function loadData() {
    const [c, e] = await Promise.all([
        fetch(`${API_URL}/api/contributions`).then(r => r.json()),
        fetch(`${API_URL}/api/expenses`).then(r => r.json())
    ]);

    updateUI(c, e);
}

// UPDATE UI
function updateUI(contributions, expenses) {

    let totalC = 0;
    let totalE = 0;

    contributions.forEach(x => totalC += x.amount);
    expenses.forEach(x => totalE += x.amount);

    document.getElementById("totalC").innerText = "₹" + totalC;
    document.getElementById("totalE").innerText = "₹" + totalE;
    document.getElementById("balance").innerText = "₹" + (totalC - totalE);

    // LIST
    document.getElementById("contribList").innerHTML =
        contributions.map(x => `
            <div class="item">
                <span>${x.name}</span>
                <span class="green">+₹${x.amount}</span>
            </div>
        `).join("");

    document.getElementById("expenseList").innerHTML =
        expenses.map(x => `
            <div class="item">
                <span>${x.name}</span>
                <span class="red">-₹${x.amount}</span>
            </div>
        `).join("");
}

// AUTO REFRESH
setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
