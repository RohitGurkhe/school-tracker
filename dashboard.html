
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10th M1 Get-Together</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BACKGROUND */
body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding: 20px;

    background:
        linear-gradient(135deg, rgba(139,69,19,0.85), rgba(210,105,30,0.85)),
        url('/school.jpeg') center/cover no-repeat;
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    margin-bottom: 20px;
    position: relative;
    padding-top: 20px;
}

.header h1 {
    font-size: 32px;
    line-height: 1.2;
    padding: 0 60px; /* prevent overlap */
}

.header p {
    font-size: 16px;
}

/* ADMIN BUTTON */
.admin-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: #8B4513;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
}

.admin-btn:hover {
    background: #6d3410;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* SUMMARY */
.summary {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: #f2f2f2;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.green { color: green; }
.red { color: red; }

/* SECTIONS */
.section {
    margin-top: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #ddd;
}

/* FOOTER */
.footer {
    text-align: center;
    color: white;
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.9;
}

/* 📱 MOBILE FIX */
@media (max-width: 600px) {

    body {
        padding: 10px;
    }

    .header h1 {
        font-size: 22px;
        padding: 0 50px;
    }

    .header p {
        font-size: 13px;
    }

    .admin-btn {
        top: 5px;
        right: 10px;
        font-size: 11px;
        padding: 5px 8px;
    }

    .summary {
        flex-direction: column;
    }

    .card {
        margin-bottom: 10px;
    }

    .container {
        padding: 15px;
    }

    .item {
        font-size: 14px;
    }

    .footer {
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🎓 10th M1 Get-Together</h1>
    <p>Event Fund Dashboard (Public View)</p>

    <a href="/login.html" class="admin-btn">Admin Login</a>
</div>

<div class="container">

    <!-- SUMMARY -->
    <div class="summary">
        <div class="card">
            <p>Total Collected</p>
            <h2 id="totalC">₹0</h2>
        </div>

        <div class="card">
            <p>Total Spent</p>
            <h2 id="totalE" class="red">₹0</h2>
        </div>

        <div class="card">
            <p>Balance</p>
            <h2 id="balance">₹0</h2>
        </div>
    </div>

    <!-- CONTRIBUTIONS -->
    <div class="section">
        <h3>💰 Contributions</h3>
        <div id="contribList"></div>
    </div>

    <!-- EXPENSES -->
    <div class="section">
        <h3>💸 Expenses</h3>
        <div id="expenseList"></div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    Created by Rohit Gurkhe
</div>

<script>
const API_URL = window.location.origin;

// LOAD DATA
async function loadData() {
    const [c, e] = await Promise.all([
        fetch(`${API_URL}/api/contributions`).then(r => r.json()),
        fetch(`${API_URL}/api/expenses`).then(r => r.json())
    ]);

    updateUI(c, e);
}

// UPDATE UI
function updateUI(contributions, expenses) {

    let totalC = 0;
    let totalE = 0;

    contributions.forEach(x => totalC += x.amount);
    expenses.forEach(x => totalE += x.amount);

    document.getElementById("totalC").innerText = "₹" + totalC;
    document.getElementById("totalE").innerText = "₹" + totalE;
    document.getElementById("balance").innerText = "₹" + (totalC - totalE);

    document.getElementById("contribList").innerHTML =
        contributions.map(x => `
            <div class="item">
                <span>${x.name}</span>
                <span class="green">+₹${x.amount}</span>
            </div>
        `).join("");

    document.getElementById("expenseList").innerHTML =
        expenses.map(x => `
            <div class="item">
                <span>${x.name}</span>
                <span class="red">-₹${x.amount}</span>
            </div>
        `).join("");
}

// AUTO REFRESH
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
